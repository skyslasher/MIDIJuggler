# GamePi13: map GPIO buttons to Linux keyboard events (gpio-key overlay).
# Append these lines to /boot/firmware/config.txt (after waveshare13).
# Each line creates one key on the shared gpio-keys input device.
#
# Button | BCM | Key
# Up     | 5   | Arrow Up
# Down   | 6   | Arrow Down
# Left   | 16  | Arrow Left
# Right  | 13  | Arrow Right
# A      | 21  | A
# B      | 20  | B
# X      | 15  | X
# Y      | 12  | Y
# Start  | 26  | S
# Select | 19  | Q
# L      | 23  | Brightness Down
# R      | 14  | Brightness Up

dtoverlay=gpio-key,gpio=5,active_low=1,gpio_pull=up,label="GPUP",keycode=103
dtoverlay=gpio-key,gpio=6,active_low=1,gpio_pull=up,label="GPDOWN",keycode=108
dtoverlay=gpio-key,gpio=16,active_low=1,gpio_pull=up,label="GPLEFT",keycode=105
dtoverlay=gpio-key,gpio=13,active_low=1,gpio_pull=up,label="GPRIGHT",keycode=106
dtoverlay=gpio-key,gpio=21,active_low=1,gpio_pull=up,label="GPA",keycode=30
dtoverlay=gpio-key,gpio=20,active_low=1,gpio_pull=up,label="GPB",keycode=48
dtoverlay=gpio-key,gpio=15,active_low=1,gpio_pull=up,label="GPX",keycode=45
dtoverlay=gpio-key,gpio=12,active_low=1,gpio_pull=up,label="GPY",keycode=21
dtoverlay=gpio-key,gpio=26,active_low=1,gpio_pull=up,label="GPSTART",keycode=31
dtoverlay=gpio-key,gpio=19,active_low=1,gpio_pull=up,label="GPSELECT",keycode=16
dtoverlay=gpio-key,gpio=23,active_low=1,gpio_pull=up,label="GPL",keycode=224
dtoverlay=gpio-key,gpio=14,active_low=1,gpio_pull=up,label="GPR",keycode=225
