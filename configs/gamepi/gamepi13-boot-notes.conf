# GamePi13 boot requirements (comments only — append manually to /boot/firmware/config.txt).
#
# GPR (R shoulder) uses BCM GPIO 14, which is also UART TX (physical pin 8).
# If button@e is missing while the GPR overlay line exists, disable UART:
#
# enable_uart=0
#
# Also remove console=serial0 / console=ttyAMA0 from /boot/firmware/cmdline.txt.
#
# waveshare13 must stay enabled for the panel; it owns GPIO 24 (backlight) in-kernel.
# Do not enable GAMEPI_PWM_BACKLIGHT on GPIO 24 — userspace will see "GPIO busy".
