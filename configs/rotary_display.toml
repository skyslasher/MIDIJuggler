[runtime]
datapoint_routing = true

[master_clock]
enabled = true
bpm = 120.0
bpm_min = 40.0
bpm_max = 240.0
auto_start = false
output_targets = ["midi"]
send_transport = true
click_enabled = false
click_interval = "quarter"
bpm_step = 1.0

[adapters.osc]
enabled = true
listen_host = "0.0.0.0"
listen_port = 9000

# Optional: bind the main OSC adapter to the rotary_display library for Connections UI.
# When [rotary_display] enabled is false, default [[connections]] are added automatically.
[[devices]]
uid = "rotary_encoder"
id = "rotary_encoder"
name = "Rotary Display"
adapter = "osc"
library = "rotary_display"
library_kind = "osc"

[rotary_display]
enabled = true
# Host transport: how MIDIJuggler sends sync/beat to the device (osc|serial|both)
transport = "both"
feedback_host = ""
feedback_port = 9001
# macOS: ls /dev/cu.usbmodem*   Linux: ls /dev/ttyACM*
serial_port = "/dev/cu.usbmodem12201"
serial_baud = 115200

[rotary_display.device]
# Device transport: how the rotary display sends/receives clock (serial|wifi|both)
transport = "both"
wifi_enabled = true
wifi_ssid = ""
wifi_pass = ""
host = "midijuggler.local"
mdns_hostname = "rotary-stage"
port = 9000
listen_port = 9001
pulse_enabled = true
bpm_step = 1.0

[web]
host = "0.0.0.0"
port = 8080
