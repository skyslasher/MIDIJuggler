# Behringer Wing USB routing: three stereo outputs on USB channels 1-6.
# Deploy to /etc/alsa/conf.d/ — do not put in /etc/midijuggler/asoundrc
# (MIDIJuggler overwrites that file for master_clock).
#
# Verify before deployment:
#   aplay -l          # card name or number for wing_hw
#   arecord -l        # CARD=g_audio for USB gadget input
#
# Uses dmix (not dshare) so multiple clients can open the same wing_stereo*
# PCM and get mixed. Channel routing uses the route plugin — ttable belongs
# there, not on plug (plug ignores ttable, which breaks multi-PCM setups).
#
# Do not set rate/format on the dmix hw slave unless they match the Wing USB
# setting exactly; a forced 48000 while the Wing runs 44100 causes
# "Slave PCM not usable".
#
# Clients must use wing_stereo1/2/3 — never plughw:CARD=WING,DEV=0 directly.

pcm.wing_hw {
    type hw
    card WING
    device 0
}

ctl.wing_hw {
    type hw
    card WING
}

pcm.wing_dmix {
    type dmix
    ipc_key 5678293
    ipc_key_add_uid true
    ipc_perm 0660
    slave {
        pcm wing_hw
        channels 6
    }
}

# wing_stereo1 → Wing USB 1-2 (ALSA channels 0-1)
pcm.wing_stereo1 {
    type plug
    slave.pcm wing_route_12
}

pcm.wing_route_12 {
    type route
    slave.pcm wing_dmix
    slave.channels 6
    ttable.0.0 1
    ttable.1.1 1
}

# wing_stereo2 → Wing USB 3-4 (ALSA channels 2-3)
pcm.wing_stereo2 {
    type plug
    slave.pcm wing_route_34
}

pcm.wing_route_34 {
    type route
    slave.pcm wing_dmix
    slave.channels 6
    ttable.0.2 1
    ttable.1.3 1
}

# wing_stereo3 → Wing USB 5-6 (ALSA channels 4-5)
pcm.wing_stereo3 {
    type plug
    slave.pcm wing_route_56
}

pcm.wing_route_56 {
    type route
    slave.pcm wing_dmix
    slave.channels 6
    ttable.0.4 1
    ttable.1.5 1
}
