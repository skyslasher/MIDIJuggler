# Behringer Wing USB routing: three stereo outputs on USB channels 1-6.
# Deploy to /etc/alsa/conf.d/ — do not put in /etc/midijuggler/asoundrc
# (MIDIJuggler overwrites that file for master_clock).
#
# Verify before deployment:
#   aplay -l          # set wing_hw card number or CARD name
#   arecord -l        # USB gadget capture, often CARD=UAC2Gadget
#
# Uses dshare (not dmix) on the Wing hardware. Multichannel dmix on this device
# fails with "Slave PCM not usable"; dshare with six channels works and still
# avoids direct hw access from applications.
#
# Three dshare PCMs share ipc_key 5678293 (one hw open) but each exposes only
# two client channels via bindings to a different pair on the Wing.
#
# ipc_key_add_uid must stay false so MIDIJuggler, Shairport-Sync, alsaloop and
# shell tests share one dshare pool. With ipc_key_add_uid true each Unix user
# gets a separate pool and the second user blocks the Wing hardware entirely.
#
# dshare assigns channels exclusively per PCM: wing_stereo1/2/3 run in parallel on
# different pairs; only one client per wing_stereo* PCM at a time.
#
# Clients must use wing_stereo1/2/3 — never plughw:CARD=WING,DEV=0 or default.

pcm.wing_hw {
    type hw
    card WING
}

ctl.wing_hw {
    type hw
    card WING
}

# wing_stereo1 → Wing USB 1-2 (ALSA channels 0-1)
pcm.wing_dshare_12 {
    type dshare
    ipc_key 5678293
    ipc_key_add_uid false
    ipc_perm 0666
    slave {
        pcm "wing_hw"
        channels 6
    }
    bindings {
        0 0
        1 1
    }
}

pcm.wing_stereo1 {
    type plug
    slave.pcm "wing_dshare_12"
}

# wing_stereo2 → Wing USB 3-4 (ALSA channels 2-3)
pcm.wing_dshare_34 {
    type dshare
    ipc_key 5678293
    ipc_key_add_uid false
    ipc_perm 0666
    slave {
        pcm "wing_hw"
        channels 6
    }
    bindings {
        0 2
        1 3
    }
}

pcm.wing_stereo2 {
    type plug
    slave.pcm "wing_dshare_34"
}

# wing_stereo3 → Wing USB 5-6 (ALSA channels 4-5)
pcm.wing_dshare_56 {
    type dshare
    ipc_key 5678293
    ipc_key_add_uid false
    ipc_perm 0666
    slave {
        pcm "wing_hw"
        channels 6
    }
    bindings {
        0 4
        1 5
    }
}

pcm.wing_stereo3 {
    type plug
    slave.pcm "wing_dshare_56"
}
