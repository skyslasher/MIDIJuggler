# Behringer Wing USB routing: three stereo outputs on USB channels 1-6.
# Deploy to /etc/alsa/conf.d/ — do not put in /etc/midijuggler/asoundrc
# (MIDIJuggler overwrites that file for master_clock).
#
# Verify card names before deployment:
#   aplay -l          # expect CARD=WING
#   arecord -l        # expect CARD=g_audio for USB gadget input
#
# Clients must use wing_stereo1/2/3 — never plughw:CARD=WING,DEV=0 directly.

pcm.wing_hw {
    type hw
    card WING
    device 0
}

pcm.wing_dmix {
    type dmix
    ipc_key 5678293
    ipc_perm 0666
    slave {
        pcm wing_hw
        channels 6
        rate 48000
        period_size 1024
        buffer_size 4096
    }
}

# wing_stereo1 → Wing USB 1-2 (ALSA channels 0-1)
pcm.wing_stereo1 {
    type plug
    slave.pcm wing_route_12
}

pcm.wing_route_12 {
    type route
    slave.pcm wing_dmix
    slave.channels 6
    ttable.0.0 1
    ttable.1.1 1
}

# wing_stereo2 → Wing USB 3-4 (ALSA channels 2-3)
pcm.wing_stereo2 {
    type plug
    slave.pcm wing_route_34
}

pcm.wing_route_34 {
    type route
    slave.pcm wing_dmix
    slave.channels 6
    ttable.0.2 1
    ttable.1.3 1
}

# wing_stereo3 → Wing USB 5-6 (ALSA channels 4-5)
pcm.wing_stereo3 {
    type plug
    slave.pcm wing_route_56
}

pcm.wing_route_56 {
    type route
    slave.pcm wing_dmix
    slave.channels 6
    ttable.0.4 1
    ttable.1.5 1
}
