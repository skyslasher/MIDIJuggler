[web]
host = "0.0.0.0"
port = 8080

[runtime]
datapoint_routing = true
feedback_suppress_ms = 500

[master_clock]
enabled = true
bpm = 120.0
bpm_min = 40.0
bpm_max = 240.0
auto_start = false
output_targets = ["midi_out"]
send_transport = true

click_enabled = false
click_wav = "/etc/midijuggler/click.wav"
click_interval = "quarter"
bpm_step = 1.0
bpm_quantize = 1.0
click_audio_device = ""

# Route clock control via [[connections]], for example:
# source = "osc:/midijuggler/clock/bpm" -> target = "clock.bpm_set"
# source = "foot_switches.pin17" -> target = "clock.start"

[adapters.osc]
enabled = true
listen_host = "0.0.0.0"
listen_port = 9000

[adapters.osc_pedalboard]
type = "osc"
enabled = false
listen_host = "0.0.0.0"
listen_port = 9001

[adapters.x32_foh]
type = "osc"
enabled = false
listen_host = "0.0.0.0"
osc_port = 10023
remote_host = "192.168.10.32"
desk_sync_on_connect = false
echo_guard_ms = 30

[adapters.wing_foh]
type = "osc"
enabled = false
listen_host = "0.0.0.0"
osc_port = 2223
remote_host = "192.168.10.48"
desk_sync_on_connect = false
desk_proxy_mode = false

[adapters.wing_native_foh]
type = "wing_native"
enabled = false
remote_host = "192.168.10.48"
native_port = 2222
echo_guard_ms = 30

[adapters.midi]
enabled = true
input_port = "MIDIJuggler In"
output_port = "MIDIJuggler Out"

[adapters.usb_stage]
type = "midi"
enabled = false
input_port = "Stage MIDI In"
output_port = "Stage MIDI Out"

[adapters.faderport]
type = "midi"
enabled = false
input_port = "PreSonus FP16 Port 1"
output_port = "PreSonus FP16 Port 1"

[adapters.xtouch_mini]
type = "midi"
enabled = false
input_port = "X-TOUCH MINI"
output_port = "X-TOUCH MINI"
echo_guard_ms = 30

[adapters.rtp_midi]
enabled = false
role = "host"
session_name = "MIDIJuggler"
port = 5004

[adapters.rtp_remote]
type = "rtp_midi"
enabled = false
role = "join"
join_target = ""
port = 5005

[adapters.gpio]
enabled = true
pins = [17, 27, 22]
active_low = true
bounce_ms = 25
poll_interval_ms = 5

[adapters.gamepad]
type = "hid"
enabled = false
vendor_id = "0x046d"
product_id = "0xc21f"
codes = ["BTN_A", "BTN_B", "ABS_X", "ABS_Y"]

[[devices]]
id = "foot_switches"
adapter = "gpio"
library_kind = "gpio"

[[devices]]
id = "midi_out"
adapter = "midi"
library_kind = "midi"

[[devices.custom_points]]
id = "cc_1_64"
direction = "bidirectional"
value_min = 0.0
value_max = 127.0
protocol = "midi"

[[devices]]
id = "osc_main"
adapter = "osc"
library_kind = "osc"

[[devices]]
id = "x32_foh"
adapter = "x32_foh"
library = "behringer_x32"
library_kind = "osc"

[[devices]]
id = "wing_foh"
adapter = "wing_foh"
library = "behringer_wing"
library_kind = "osc"

[[devices]]
id = "wing_native_foh"
adapter = "wing_native_foh"
library = "behringer_wing"
library_kind = "wing"

[[devices]]
id = "faderport"
adapter = "faderport"
library = "presonus_faderport"
library_kind = "midi"

[[devices]]
id = "xtouch_mini"
adapter = "xtouch_mini"
library = "behringer_xtouch_mini"
library_kind = "midi"
feedback_refresh_interval = 0

[[connections]]
id = "gpio-footswitch-to-midi-cc"
source = "foot_switches.pin17"
target = "midi_out.cc_1_64"
input_min = 0.0
input_max = 1.0
output_min = 0.0
output_max = 127.0
invert = false

[[connections]]
id = "gpio-to-x32-channel-01-bus-01-send"
source = "foot_switches.pin27"
target = "x32_foh./ch/01/mix/01/level"
input_min = 0.0
input_max = 1.0
output_min = 0.0
output_max = 1.0
invert = false

[[connections]]
id = "gpio-to-wing-channel-1-bus-1-send"
source = "foot_switches.pin22"
target = "wing_foh./ch/1/send/1/lvl"
input_min = 0.0
input_max = 1.0
output_min = 0.0
output_max = 1.0
invert = false

[[connections]]
id = "faderport-channel-1-to-x32-monitor-send"
source = "faderport.ch_1_fader"
target = "x32_foh./ch/01/mix/01/level"
input_min = 0.0
input_max = 16383.0
output_min = 0.0
output_max = 1.0
invert = false

[[connections]]
id = "xtouch-mini-encoder-1-to-x32-monitor-send"
source = "xtouch_mini.layer_a_encoder_1_turn"
target = "x32_foh./ch/01/mix/01/level"
input_min = 0.0
input_max = 127.0
output_min = 0.0
output_max = 1.0
invert = false

[[connections]]
id = "clock-eighth-ms-to-fx-delay"
source = "clock.eighth_ms"
target = "wing_foh./fx/1/time"
input_min = 50.0
input_max = 1000.0
output_min = 50.0
output_max = 1000.0
invert = false
