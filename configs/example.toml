[web]
host = "0.0.0.0"
port = 8080

[master_clock]
enabled = true
bpm = 120.0
bpm_min = 40.0
bpm_max = 240.0
auto_start = false
output_targets = ["usb_midi", "rtp_midi"]
send_transport = true

# Remote control:
# OSC: /midijuggler/clock/bpm 128.5
# OSC: /midijuggler/clock/click_interval "quarter"
bpm_osc_address = "/midijuggler/clock/bpm"
click_interval_osc_address = "/midijuggler/clock/click_interval"

# MIDI CC pair for 14-bit BPM control on channel 1.
bpm_msb_cc = 20
bpm_lsb_cc = 21
click_interval_cc = 22
midi_channel = 1

# Optional audio click via ALSA/aplay and a USB sound card.
click_enabled = false
click_wav = "/etc/midijuggler/click.wav"
click_interval = "quarter"
click_command = "aplay"
click_audio_device = ""

[adapters.osc]
enabled = true
listen_host = "0.0.0.0"
listen_port = 9000

# Additional OSC/USB-MIDI/RTP-MIDI instances use their own table name and a type.
# The table name becomes the routing prefix in mappings, for example
# source = "osc_pedalboard:/pedal/expression".
[adapters.osc_pedalboard]
type = "osc"
enabled = false
listen_host = "0.0.0.0"
listen_port = 9001

[adapters.x32_foh]
type = "osc"
enabled = false
listen_host = "0.0.0.0"
listen_port = 9100
remote_host = "192.168.10.32"
remote_port = 10023
osc_library = "behringer_x32"

[adapters.wing_foh]
type = "osc"
enabled = false
listen_host = "0.0.0.0"
listen_port = 9101
remote_host = "192.168.10.48"
remote_port = 2223
osc_library = "behringer_wing"

[adapters.usb_midi]
enabled = true
input_port = "MIDIJuggler In"
output_port = "MIDIJuggler Out"

[adapters.usb_stage]
type = "usb_midi"
enabled = false
input_port = "Stage MIDI In"
output_port = "Stage MIDI Out"

[adapters.faderport]
type = "usb_midi"
enabled = false
input_port = "PreSonus FP16 Port 1"
output_port = "PreSonus FP16 Port 1"
midi_library = "presonus_faderport"

[adapters.xtouch_mini]
type = "usb_midi"
enabled = false
input_port = "X-TOUCH MINI"
output_port = "X-TOUCH MINI"
midi_library = "behringer_xtouch_mini"

[adapters.rtp_midi]
enabled = false
session_name = "MIDIJuggler"
port = 5004

[adapters.rtp_remote]
type = "rtp_midi"
enabled = false
session_name = "MIDIJuggler Remote"
port = 5005

[adapters.gpio]
enabled = true
# The number of GPIO inputs is the number of entries in this list.
# BCM numbering is used, matching Raspberry Pi GPIO labels.
pins = [17, 27, 22]
active_low = true
bounce_ms = 25
poll_interval_ms = 5

[[mappings]]
id = "gpio-footswitch-to-midi-cc"
source = "gpio:pin17"
target = "usb_midi:cc:1:64"
input_min = 0.0
input_max = 1.0
output_min = 0.0
output_max = 127.0
invert = false

[[mappings]]
id = "osc-expression-inverted"
source = "osc:/pedal/expression"
target = "rtp_midi:cc:1:11"
input_min = 0.0
input_max = 1.0
output_min = 0.0
output_max = 127.0
invert = true

[[mappings]]
id = "gpio-to-x32-channel-01-bus-01-send"
source = "gpio:pin27"
target = "x32_foh:/ch/01/mix/01/level"
input_min = 0.0
input_max = 1.0
output_min = 0.0
output_max = 1.0
invert = false

[[mappings]]
id = "gpio-to-wing-channel-1-bus-1-send"
source = "gpio:pin22"
target = "wing_foh:/ch/1/send/1/lvl"
input_min = 0.0
input_max = 1.0
output_min = 0.0
output_max = 1.0
invert = false

[[mappings]]
id = "faderport-channel-1-to-x32-monitor-send"
source = "faderport:ch_1_fader"
target = "x32_foh:/ch/01/mix/01/level"
input_min = 0.0
input_max = 16383.0
output_min = 0.0
output_max = 1.0
invert = false

[[mappings]]
id = "xtouch-mini-encoder-1-to-x32-monitor-send"
source = "xtouch_mini:layer_a_encoder_1_turn"
target = "x32_foh:/ch/01/mix/01/level"
input_min = 0.0
input_max = 127.0
output_min = 0.0
output_max = 1.0
invert = false

[[mappings]]
id = "clock-eighth-ms-to-delay-time"
source = "clock:eighth_ms"
target = "osc:/fx/delay/time_ms"
input_min = 50.0
input_max = 1000.0
output_min = 50.0
output_max = 1000.0
invert = false
