<!DOCTYPE html>
<html lang="de" translate="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=240, height=240, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="google" content="notranslate">
  <title>MIDIJuggler GamePi</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      --bg: #10141f;
      --panel: #182032;
      --line: #2b3752;
      --text: #edf2ff;
      --accent: #6ea8fe;
      --on: #7dffb0;
      --off: #ff9b9b;
      --inset-top: 8px;
      --inset-right: 12px;
      --inset-bottom: 8px;
      --inset-left: 6px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      background: var(--bg);
      color: var(--text);
      height: 240px;
      margin: 0;
      max-height: 240px;
      max-width: 240px;
      overflow: hidden;
      position: relative;
      width: 240px;
    }

    body {
      padding:
        var(--inset-top)
        var(--inset-right)
        var(--inset-bottom)
        var(--inset-left);
    }

    .screen {
      display: grid;
      gap: 8px;
      grid-template-rows: 1fr auto auto;
      height: 100%;
      max-width: 100%;
      min-height: 0;
      overflow: hidden;
      width: 100%;
    }

    .hero {
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      max-width: 100%;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
      padding: 6px;
      position: relative;
      width: 100%;
    }

    .hero.focused {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .live-dot {
      background: #556;
      border-radius: 50%;
      height: 7px;
      pointer-events: none;
      position: absolute;
      right: 6px;
      top: 6px;
      width: 7px;
    }

    .live-dot.on {
      background: var(--on);
      box-shadow: 0 0 6px var(--on);
    }

    .bpm-card {
      background: #263757;
      border: 1px solid transparent;
      border-radius: 14px;
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
      padding: 0px;
      text-align: center;
      width: 100%;
    }

    .bpm-card.running {
      background: #6b2222;
      border-color: color-mix(in srgb, var(--off) 45%, #6b2222);
    }

    .bpm-card.pulse-disabled {
      animation: none !important;
    }

    .bpm-card.beat-pulse {
      animation: tap-pulse 140ms ease-out;
    }

    @keyframes tap-pulse {
      from {
        box-shadow: 0 0 0 0 rgb(110 168 254 / 95%);
        filter: brightness(1.4);
      }

      to {
        box-shadow: 0 0 0 8px rgb(110 168 254 / 0%);
        filter: brightness(1);
      }
    }

    .bpm-value {
      font-size: 6.0rem;
      font-variant-numeric: tabular-nums;
      font-weight: 800;
      line-height: 0.92;
      max-width: 100%;
      overflow: visible;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
      width: 100%;
    }

    .row {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      max-width: 100%;
      min-width: 0;
      width: 100%;
    }

    .row.brightness {
      grid-template-columns: 32px minmax(0, 1fr) 32px;
    }

    button {
      appearance: none;
      background: var(--accent);
      border: 0;
      border-radius: 10px;
      color: #08111f;
      cursor: pointer;
      font: inherit;
      font-size: 1.0rem;
      font-weight: 700;
      min-height: 38px;
      min-width: 0;
      overflow: visible;
      padding: 0.35rem 0.2rem;
      white-space: nowrap;
    }

    button.secondary {
      background: var(--line);
      color: var(--text);
    }

    button.secondary.active {
      background: color-mix(in srgb, var(--accent) 35%, var(--line));
      color: var(--text);
    }

    button.secondary.inactive {
      opacity: 0.55;
    }

    button.focused {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    button:active {
      transform: scale(0.97);
    }

    .brightness-track {
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      display: flex;
      justify-content: center;
      min-height: 38px;
      padding: 0 6px;
      pointer-events: none;
    }

    .brightness-meter {
      background: var(--line);
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
      width: 100%;
    }

    .brightness-meter > span {
      background: var(--accent);
      display: block;
      height: 100%;
      width: 0;
    }

    .message {
      color: var(--off);
      font-size: 0.58rem;
      min-height: 0.7rem;
      text-align: center;
    }

    .modal-backdrop {
      align-items: center;
      background: rgb(8 12 20 / 82%);
      display: none;
      inset: 0;
      justify-content: center;
      padding: 0 8px;
      position: absolute;
      z-index: 20;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-sizing: border-box;
      flex-shrink: 0;
      max-width: 200px;
      padding: 10px 6px;
      width: 200px;
    }

    .modal h2 {
      font-size: 1.5rem;
      margin: 0 0 8px;
      text-align: center;
    }

    .modal-actions {
      display: grid;
      gap: 5px;
      grid-template-columns: 1fr 1fr;
    }

    .modal-actions button {
      font-size: 0.8rem;
      min-height: 34px;
      padding: 0.25rem 0.1rem;
    }

    .modal-actions button.danger {
      background: var(--off);
      color: #1a0505;
    }
  </style>
</head>
<body>
  <div class="screen">
    <section class="hero focused" id="hero" tabindex="-1" aria-label="BPM">
      <span class="live-dot" id="live-dot" title="Verbindung"></span>
      <div class="bpm-card" id="bpm-card">
        <div class="bpm-value" id="bpm">--</div>
      </div>
    </section>

    <div class="row" id="control-row">
      <button type="button" class="secondary inactive" data-action="click_toggle" id="btn-click">Klick</button>
      <button type="button" class="secondary active" data-action="flash" id="btn-flash">Puls</button>
      <button type="button" class="secondary" data-action="interval" id="btn-interval">1/4</button>
    </div>

    <div class="row brightness" id="brightness-row">
      <button type="button" class="secondary" data-action="brightness_down" id="btn-dim">−</button>
      <div class="brightness-track" id="brightness-track" aria-hidden="true">
        <div class="brightness-meter"><span id="brightness-fill"></span></div>
      </div>
      <button type="button" class="secondary" data-action="brightness_up" id="btn-bright">+</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <div class="modal-backdrop" id="reboot-modal" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="reboot-title">
      <h2 id="reboot-title">Neustart?</h2>
      <div class="modal-actions">
        <button type="button" class="danger" id="reboot-ok">OK</button>
        <button type="button" class="secondary focused" id="reboot-cancel">Abbrechen</button>
      </div>
    </div>
  </div>

  <script>
    const bpmEl = document.querySelector("#bpm");
    const bpmCard = document.querySelector("#bpm-card");
    const liveDot = document.querySelector("#live-dot");
    const messageEl = document.querySelector("#message");
    const heroEl = document.querySelector("#hero");
    const screenEl = document.querySelector(".screen");
    const btnClick = document.querySelector("#btn-click");
    const btnFlash = document.querySelector("#btn-flash");
    const btnInterval = document.querySelector("#btn-interval");
    const btnDim = document.querySelector("#btn-dim");
    const btnBright = document.querySelector("#btn-bright");
    const brightnessTrack = document.querySelector("#brightness-track");
    const brightnessFill = document.querySelector("#brightness-fill");
    const rebootModal = document.querySelector("#reboot-modal");
    const rebootOk = document.querySelector("#reboot-ok");
    const rebootCancel = document.querySelector("#reboot-cancel");

    const CLICK_INTERVALS = ["sixteenth", "eighth", "quarter", "half", "whole"];
    const CLICK_SHORT = {
      sixteenth: "1/16",
      eighth: "1/8",
      quarter: "1/4",
      half: "1/2",
      whole: "1/1",
    };
    const FLASH_PREF_KEY = "midijuggler.gamepi.beatFlash";
    const BEAT_FLASH_INTERVAL_RATIO = 0.9;
    const BEAT_INTERVAL_MS_KEYS = {
      sixteenth: "sixteenth_ms",
      eighth: "eighth_ms",
      quarter: "quarter_ms",
      half: "half_ms",
      whole: "whole_ms",
    };

    const focusables = [
      btnClick,
      btnFlash,
      btnInterval,
      btnDim,
      btnBright,
    ];

    let zone = "bpm";
    let focusIndex = 0;
    let modalOpen = false;
    let modalFocus = "cancel";
    let beatFlashTimer = null;
    let currentClickInterval = "quarter";
    let currentClock = null;
    let datapointRouting = false;
    let beatFlashEnabled = localStorage.getItem(FLASH_PREF_KEY) !== "0";
    let brightnessAvailable = false;
    let brightnessLevel = 0;
    let brightnessMax = 255;
    const BRIGHTNESS_GAMMA_MIN = 0.12;
    const BRIGHTNESS_GAMMA_MAX = 1.0;
    const BRIGHTNESS_DEFAULT = 200;
    const REBOOT_HOLD_MS = 5000;
    const keysHeld = new Set();
    let rebootComboTriggered = false;
    let brightnessResetTriggered = false;
    let rebootHoldTimer = null;
    let displayWakeLock = null;
    let keepAwakeTimer = null;
    const KEEP_AWAKE_INTERVAL_MS = 20000;

    // GamePi13 gpio-key: physical Start → KEY_Q, Select → KEY_S (Chromium: q / s).
    function isStartKey(key) {
      return key === "q" || key === "Q";
    }

    function isSelectKey(key) {
      return key === "s" || key === "S";
    }

    function isStartHeld() {
      return keysHeld.has("q") || keysHeld.has("Q");
    }

    function isSelectHeld() {
      return keysHeld.has("s") || keysHeld.has("S");
    }

    function isLeftHeld() {
      return keysHeld.has("ArrowLeft");
    }

    function isAHeld() {
      return keysHeld.has("a") || keysHeld.has("A");
    }

    function isRebootComboHeld() {
      return isLeftHeld() && isAHeld();
    }

    function isBrightnessResetComboHeld() {
      return isStartHeld() && isSelectHeld();
    }

    function clearRebootHoldTimer() {
      if (rebootHoldTimer) {
        clearTimeout(rebootHoldTimer);
        rebootHoldTimer = null;
      }
    }

    function startRebootHoldTimer() {
      clearRebootHoldTimer();
      rebootHoldTimer = setTimeout(() => {
        rebootHoldTimer = null;
        if (!isRebootComboHeld()) {
          return;
        }
        closeRebootModal();
        rebootComboTriggered = false;
        requestReboot();
      }, REBOOT_HOLD_MS);
    }

    function apiBase() {
      const params = new URLSearchParams(window.location.search);
      const host = params.get("host") || window.location.origin;
      return host.replace(/\/$/, "");
    }

    function wsUrl() {
      return apiBase().replace(/^http/i, "ws") + "/ws/monitor";
    }

    function setMessage(text) {
      messageEl.textContent = text || "";
    }

    function setZone(nextZone) {
      zone = nextZone;
      heroEl.classList.toggle("focused", zone === "bpm");
      focusables.forEach((el, index) => {
        el.classList.toggle("focused", zone === "controls" && index === focusIndex);
      });
    }

    function moveFocus(delta) {
      focusIndex = (focusIndex + delta + focusables.length) % focusables.length;
      setZone("controls");
    }

    function clickIntervalMsFromBpm(bpm, interval) {
      const quarterMs = 60000 / bpm;
      switch (interval) {
        case "sixteenth": return quarterMs / 4;
        case "eighth": return quarterMs / 2;
        case "half": return quarterMs * 2;
        case "whole": return quarterMs * 4;
        default: return quarterMs;
      }
    }

    function beatIntervalMs(clock) {
      const interval = clock?.click_interval || "quarter";
      const params = clock?.parameters || {};
      const key = BEAT_INTERVAL_MS_KEYS[interval] || "quarter_ms";
      const fromParams = Number(params[key]);
      if (Number.isFinite(fromParams) && fromParams > 0) {
        return fromParams;
      }
      const bpm = Number(clock?.bpm);
      if (!Number.isFinite(bpm) || bpm <= 0) {
        return 500;
      }
      return clickIntervalMsFromBpm(bpm, interval);
    }

    function effectiveFlashMs(clock) {
      const configured = Number(clock?.beat_flash_ms) || 120;
      const intervalMs = beatIntervalMs(clock);
      return Math.max(1, Math.min(configured, intervalMs * BEAT_FLASH_INTERVAL_RATIO));
    }

    function isBeatActive(value) {
      if (value?.float_value != null) {
        return Number(value.float_value) > 0.5;
      }
      if (value?.bool_value != null) {
        return Boolean(value.bool_value);
      }
      return false;
    }

    function setBeatPulse(active) {
      if (!beatFlashEnabled || !bpmCard) {
        return;
      }
      if (active) {
        bpmCard.classList.remove("beat-pulse");
        void bpmCard.offsetWidth;
        bpmCard.classList.add("beat-pulse");
        if (beatFlashTimer) {
          clearTimeout(beatFlashTimer);
          beatFlashTimer = null;
        }
        return;
      }
      bpmCard.classList.remove("beat-pulse");
      if (beatFlashTimer) {
        clearTimeout(beatFlashTimer);
        beatFlashTimer = null;
      }
    }

    async function requestDisplayKeepAwake() {
      try {
        await apiFetch("/api/gamepi/keep-awake", { method: "POST", body: "{}" });
      } catch {
        // Best-effort; blanking watch service is the primary guard.
      }
    }

    async function acquireDisplayWakeLock() {
      if (!("wakeLock" in navigator)) {
        return;
      }
      try {
        if (!displayWakeLock) {
          displayWakeLock = await navigator.wakeLock.request("screen");
        }
      } catch {
        displayWakeLock = null;
      }
    }

    async function releaseDisplayWakeLock() {
      if (!displayWakeLock) {
        return;
      }
      try {
        await displayWakeLock.release();
      } catch {
        // ignore
      }
      displayWakeLock = null;
    }

    function updateDisplayKeepAwake(running) {
      if (keepAwakeTimer) {
        clearInterval(keepAwakeTimer);
        keepAwakeTimer = null;
      }
      if (running) {
        requestDisplayKeepAwake();
        acquireDisplayWakeLock();
        keepAwakeTimer = setInterval(() => {
          requestDisplayKeepAwake();
        }, KEEP_AWAKE_INTERVAL_MS);
        return;
      }
      releaseDisplayWakeLock();
    }

    function pulseBeatFallback() {
      if (!beatFlashEnabled) {
        return;
      }
      setBeatPulse(true);
      if (beatFlashTimer) {
        clearTimeout(beatFlashTimer);
      }
      beatFlashTimer = setTimeout(() => {
        setBeatPulse(false);
        beatFlashTimer = null;
      }, effectiveFlashMs(currentClock));
    }

    function updateFlashButton() {
      btnFlash.classList.toggle("active", beatFlashEnabled);
      btnFlash.classList.toggle("inactive", !beatFlashEnabled);
      bpmCard.classList.toggle("pulse-disabled", !beatFlashEnabled);
      if (!beatFlashEnabled) {
        setBeatPulse(false);
      }
    }

    function brightnessDisplayRatio() {
      if (!brightnessAvailable || brightnessMax <= 0) {
        return 1;
      }
      const ratio = Math.max(0, Math.min(brightnessLevel / brightnessMax, 1));
      return BRIGHTNESS_GAMMA_MIN + ratio * (BRIGHTNESS_GAMMA_MAX - BRIGHTNESS_GAMMA_MIN);
    }

    function applyBrightnessState(available, level, max) {
      brightnessAvailable = Boolean(available);
      if (Number.isFinite(level)) {
        brightnessLevel = level;
      }
      if (Number.isFinite(max) && max > 0) {
        brightnessMax = max;
      }
      renderBrightness();
    }

    function applyBrightnessDatapoint(value) {
      if (!value) {
        return;
      }
      applyBrightnessState(
        value.bool_value,
        Number(value.int_value),
        Number(value.float_value),
      );
    }

    function renderBrightness() {
      if (!brightnessAvailable) {
        brightnessFill.style.width = "35%";
        brightnessTrack.title = "Kein Backlight (L/R)";
        if (screenEl) {
          screenEl.style.filter = "";
        }
        return;
      }
      const pct = brightnessMax > 0 ? (brightnessLevel / brightnessMax) * 100 : 0;
      brightnessFill.style.width = `${pct}%`;
      brightnessTrack.title = `Helligkeit ${brightnessLevel}/${brightnessMax}`;
      const displayRatio = brightnessDisplayRatio();
      if (screenEl) {
        screenEl.style.filter =
          displayRatio < BRIGHTNESS_GAMMA_MAX - 0.001 ? `brightness(${displayRatio})` : "";
      }
    }

    function formatBpmDisplay(value) {
      const amount = Number(value);
      if (!Number.isFinite(amount)) {
        return "--";
      }
      return String(Math.round(amount));
    }

    function renderClock(clock) {
      if (!clock) {
        return;
      }
      currentClock = { ...currentClock, ...clock };
      if (clock.bpm != null) {
        bpmEl.textContent = clock.bpm ? formatBpmDisplay(clock.bpm) : "--";
      }
      if (clock.running != null) {
        bpmCard.classList.toggle("running", Boolean(clock.running));
        updateDisplayKeepAwake(Boolean(clock.running));
      }

      if (clock.click_enabled != null) {
        const clickEnabled = Boolean(clock.click_enabled);
        btnClick.classList.toggle("active", clickEnabled);
        btnClick.classList.toggle("inactive", !clickEnabled);
      }

      if (clock.click_interval != null) {
        const interval = clock.click_interval || "quarter";
        currentClickInterval = interval;
        btnInterval.textContent = CLICK_SHORT[interval] || interval;
      }
    }

    function nextClickInterval(interval) {
      const index = CLICK_INTERVALS.indexOf(interval);
      if (index < 0) {
        return CLICK_INTERVALS[0];
      }
      return CLICK_INTERVALS[(index + 1) % CLICK_INTERVALS.length];
    }

    async function apiFetch(path, options = {}) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      const response = await fetch(apiBase() + path, { ...options, headers });
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || response.statusText);
      }
      return response.json();
    }

    async function trigger(point) {
      setMessage("");
      try {
        const payload = await apiFetch("/api/clock/trigger", {
          method: "POST",
          body: JSON.stringify({ point }),
        });
        renderClock(payload.master_clock);
      } catch (error) {
        setMessage(error.message || "Trigger fehlgeschlagen");
      }
    }

    async function setClickInterval(interval) {
      setMessage("");
      try {
        const payload = await apiFetch("/api/master-clock", {
          method: "POST",
          body: JSON.stringify({ click_interval: interval }),
        });
        renderClock(payload);
      } catch (error) {
        setMessage(error.message || "Intervall nicht gesetzt");
      }
    }

    async function adjustBrightness(delta) {
      setMessage("");
      try {
        const payload = await apiFetch("/api/gamepi/brightness", {
          method: "POST",
          body: JSON.stringify({ delta }),
        });
        if (payload.available && payload.ok !== false) {
          applyBrightnessState(
            payload.available,
            Number(payload.level),
            Number(payload.max),
          );
        } else if (payload.available && payload.ok === false) {
          setMessage("Helligkeit nicht gesetzt");
        } else {
          applyBrightnessState(false, 0, brightnessMax);
          setMessage("Kein Backlight-Gerät");
        }
      } catch (error) {
        setMessage(error.message || "Helligkeit fehlgeschlagen");
      }
    }

    async function resetBrightnessDefault() {
      if (brightnessResetTriggered) {
        return;
      }
      brightnessResetTriggered = true;
      const delta = BRIGHTNESS_DEFAULT - brightnessLevel;
      if (delta !== 0) {
        await adjustBrightness(delta);
      } else {
        renderBrightness();
      }
    }

    async function requestReboot() {
      setMessage("");
      try {
        const payload = await apiFetch("/api/gamepi/reboot", { method: "POST", body: "{}" });
        if (payload.ok === false) {
          setMessage(payload.error || "Neustart fehlgeschlagen");
          return;
        }
        setMessage("Neustart…");
      } catch (error) {
        setMessage(error.message || "Neustart fehlgeschlagen");
      }
    }

    function toggleFlash() {
      beatFlashEnabled = !beatFlashEnabled;
      localStorage.setItem(FLASH_PREF_KEY, beatFlashEnabled ? "1" : "0");
      updateFlashButton();
    }

    function activateFocus() {
      const target = focusables[focusIndex];
      if (!target) {
        return;
      }
      if (target === btnClick) {
        trigger("click_toggle");
        return;
      }
      if (target === btnFlash) {
        toggleFlash();
        return;
      }
      if (target === btnInterval) {
        setClickInterval(nextClickInterval(currentClickInterval));
        return;
      }
      if (target === btnDim) {
        adjustBrightness(-10);
        return;
      }
      if (target === btnBright) {
        adjustBrightness(10);
        return;
      }
    }

    function setModalFocus(which) {
      modalFocus = which;
      rebootOk.classList.toggle("focused", which === "ok");
      rebootCancel.classList.toggle("focused", which === "cancel");
    }

    function handleRebootCombo() {
      if (rebootComboTriggered) {
        return;
      }
      rebootComboTriggered = true;
      openRebootModal();
      startRebootHoldTimer();
    }

    function openRebootModal() {
      if (modalOpen) {
        return;
      }
      modalOpen = true;
      rebootModal.classList.add("open");
      rebootModal.setAttribute("aria-hidden", "false");
      setModalFocus("cancel");
    }

    function closeRebootModal() {
      modalOpen = false;
      clearRebootHoldTimer();
      rebootModal.classList.remove("open");
      rebootModal.setAttribute("aria-hidden", "true");
    }

    // Face buttons (A/B/X/Y) adjust BPM; D-pad is navigation only.
    const FACE_BUTTON_BPM_BY_CODE = {
      KeyX: "bpm_huge_up",
      KeyY: "bpm_down",
      KeyA: "bpm_up",
      KeyB: "bpm_huge_down",
    };

    const FACE_BUTTON_BPM = {
      x: "bpm_huge_up",
      X: "bpm_huge_up",
      y: "bpm_down",
      Y: "bpm_down",
      a: "bpm_up",
      A: "bpm_up",
      b: "bpm_huge_down",
      B: "bpm_huge_down",
    };

    function faceButtonBpmPoint(event) {
      const byCode = FACE_BUTTON_BPM_BY_CODE[event.code];
      if (byCode) {
        return byCode;
      }
      return FACE_BUTTON_BPM[event.key] ?? null;
    }

    function handleKeyDown(event) {
      keysHeld.add(event.key);

      if (isRebootComboHeld()) {
        event.preventDefault();
        handleRebootCombo();
        return;
      }

      if (isBrightnessResetComboHeld()) {
        event.preventDefault();
        resetBrightnessDefault();
        return;
      }

      if (modalOpen) {
        event.preventDefault();
        if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
          setModalFocus(modalFocus === "cancel" ? "ok" : "cancel");
          return;
        }
        if (event.key === "Enter" || isStartKey(event.key)) {
          if (modalFocus === "ok") {
            closeRebootModal();
            requestReboot();
          } else {
            closeRebootModal();
            rebootComboTriggered = false;
          }
          return;
        }
        if (event.key === "Escape" || isSelectKey(event.key)) {
          closeRebootModal();
          rebootComboTriggered = false;
        }
        return;
      }

      if (isSelectKey(event.key)) {
        event.preventDefault();
        trigger("start_stop");
        return;
      }

      const bpmPoint = faceButtonBpmPoint(event);
      if (bpmPoint) {
        event.preventDefault();
        trigger(bpmPoint);
        return;
      }

      if (event.key === "Enter" || isStartKey(event.key)) {
        event.preventDefault();
        if (zone === "controls") {
          activateFocus();
        } else {
          trigger("tap_tempo");
        }
        return;
      }

      if (event.key === "ArrowUp") {
        event.preventDefault();
        if (zone === "controls") {
          setZone("bpm");
        }
        return;
      }

      if (event.key === "ArrowDown") {
        event.preventDefault();
        if (zone === "bpm") {
          setZone("controls");
        }
        return;
      }

      if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
        event.preventDefault();
        if (zone === "controls") {
          moveFocus(event.key === "ArrowLeft" ? -1 : 1);
        }
      }
    }

    function handleKeyUp(event) {
      keysHeld.delete(event.key);
      clearRebootHoldTimer();
      if (!isRebootComboHeld()) {
        rebootComboTriggered = false;
      }
      if (!isBrightnessResetComboHeld()) {
        brightnessResetTriggered = false;
      }
    }

    focusables.forEach((button, index) => {
      button.addEventListener("click", () => {
        focusIndex = index;
        setZone("controls");
        activateFocus();
      });
    });

    rebootOk.addEventListener("click", () => {
      closeRebootModal();
      requestReboot();
    });
    rebootCancel.addEventListener("click", () => {
      closeRebootModal();
      rebootComboTriggered = false;
    });

    document.addEventListener("keydown", handleKeyDown);
    document.addEventListener("keyup", handleKeyUp);

    updateFlashButton();
    setZone("bpm");

    function connectMonitor() {
      const socket = new WebSocket(wsUrl());
      socket.addEventListener("open", () => {
        liveDot.classList.add("on");
        setMessage("");
      });
      socket.addEventListener("close", () => {
        liveDot.classList.remove("on");
        setTimeout(connectMonitor, 1500);
      });
      socket.addEventListener("error", () => {
        liveDot.classList.remove("on");
      });
      socket.addEventListener("message", (event) => {
        let payload;
        try {
          payload = JSON.parse(event.data);
        } catch {
          return;
        }
        if (payload.type === "status") {
          renderClock(payload.payload.master_clock);
          return;
        }
        if (payload.type === "datapoint" && payload.payload?.id === "clock.beat") {
          setBeatPulse(isBeatActive(payload.payload));
          return;
        }
        if (payload.type === "datapoint" && payload.payload?.id === "gamepi.brightness") {
          applyBrightnessDatapoint(payload.payload);
          return;
        }
        if (payload.type === "datapoint" && payload.payload?.id?.startsWith("clock.")) {
          if (payload.payload.id === "clock.click_enabled" && payload.payload.bool_value != null) {
            renderClock({ click_enabled: payload.payload.bool_value });
          } else if (payload.payload.id === "clock.bpm" && payload.payload.float_value != null) {
            renderClock({ bpm: payload.payload.float_value });
          } else if (payload.payload.id === "clock.running" && payload.payload.bool_value != null) {
            renderClock({ running: payload.payload.bool_value });
            updateDisplayKeepAwake(Boolean(payload.payload.bool_value));
          }
          return;
        }
        if (
          payload.type === "event"
          && payload.payload?.kind === "ClickEvent"
          && !datapointRouting
        ) {
          pulseBeatFallback();
        }
      });
    }

    apiFetch("/api/status")
      .then((payload) => {
        datapointRouting = Boolean(payload.datapoint_routing);
        renderClock(payload.master_clock);
      })
      .catch((error) => setMessage(error.message || "Status nicht geladen"));

    connectMonitor();
  </script>
</body>
</html>
