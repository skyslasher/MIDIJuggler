<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MIDIJuggler</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>MIDIJuggler</h1>
          <p>OSC, USB MIDI, RTP-MIDI and GPIO routing monitor</p>
        </div>
        <div class="bpm-card">
          <span>BPM</span>
          <strong id="bpm">--</strong>
        </div>
      </header>

      <section class="toolbar">
        <button id="learn-toggle" type="button">Enable learn mode</button>
        <button id="configuration-toggle" type="button">Configuration</button>
        <button id="configuration-exit" type="button" hidden>Exit configuration</button>
        <span id="connection-state">connecting...</span>
      </section>

      <section id="monitor-view" class="grid">
        <article>
          <h2>Master Clock</h2>
          <div id="master-clock" class="master-status"></div>
        </article>
        <article>
          <h2>Mappings</h2>
          <ul id="mappings"></ul>
        </article>
        <article>
          <h2>OSC Libraries</h2>
          <ul id="osc-libraries"></ul>
        </article>
        <article>
          <h2>MIDI Libraries</h2>
          <ul id="midi-libraries"></ul>
        </article>
        <article>
          <h2>Monitor</h2>
          <ol id="events" class="events"></ol>
        </article>
      </section>

      <section id="configuration-view" class="grid" hidden>
        <article>
          <h2>MIDI Master Clock</h2>
          <form id="master-clock-form">
            <label class="inline-field">
              <input id="master-enabled" type="checkbox" />
              Enabled
            </label>
            <label class="inline-field">
              <input id="master-auto-start" type="checkbox" />
              Auto start
            </label>
            <label class="inline-field">
              <input id="master-send-transport" type="checkbox" />
              Send transport
            </label>
            <div class="form-grid">
              <label>
                BPM
                <input id="master-bpm" type="number" min="1" step="0.1" />
              </label>
              <label>
                BPM min
                <input id="master-bpm-min" type="number" min="1" step="0.1" />
              </label>
              <label>
                BPM max
                <input id="master-bpm-max" type="number" min="1" step="0.1" />
              </label>
              <label>
                MIDI channel
                <input id="master-midi-channel" type="number" min="1" max="16" step="1" />
              </label>
              <label>
                BPM MSB CC
                <input id="master-bpm-msb-cc" type="number" min="0" max="127" step="1" />
              </label>
              <label>
                BPM LSB CC
                <input id="master-bpm-lsb-cc" type="number" min="0" max="127" step="1" />
              </label>
              <label>
                Click interval CC
                <input id="master-click-cc" type="number" min="0" max="127" step="1" />
              </label>
              <label>
                Click interval
                <select id="master-click-interval">
                  <option value="eighth">Eighth</option>
                  <option value="quarter">Quarter</option>
                  <option value="half">Half</option>
                  <option value="whole">Whole</option>
                </select>
              </label>
            </div>
            <fieldset>
              <legend>MIDI clock outputs</legend>
              <div id="master-output-targets" class="target-list"></div>
            </fieldset>
            <label>
              BPM OSC address
              <input id="master-bpm-osc" type="text" />
            </label>
            <label>
              Click interval OSC address
              <input id="master-click-osc" type="text" />
            </label>
            <label class="inline-field">
              <input id="master-click-enabled" type="checkbox" />
              Audio click enabled
            </label>
            <label>
              Click WAV
              <input id="master-click-wav" type="text" />
            </label>
            <label>
              Click command
              <input id="master-click-command" type="text" />
            </label>
            <label>
              Click audio device
              <input id="master-click-device" type="text" />
            </label>
            <button type="submit">Save master clock</button>
            <p id="master-clock-message" class="message"></p>
          </form>
        </article>
        <article>
          <h2>GPIO Inputs</h2>
          <form id="gpio-form">
            <div id="gpio-pins" class="gpio-pins"></div>
            <label class="inline-field">
              <input id="gpio-active-low" type="checkbox" />
              Active low
            </label>
            <label>
              Bounce ms
              <input id="gpio-bounce-ms" type="number" min="0" step="1" />
            </label>
            <label>
              Poll interval ms
              <input id="gpio-poll-ms" type="number" min="1" step="1" />
            </label>
            <button type="submit">Save GPIO inputs</button>
            <p id="gpio-message" class="message"></p>
          </form>
        </article>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
