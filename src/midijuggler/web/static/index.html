<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MIDIJuggler</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>MIDIJuggler</h1>
          <p>OSC, USB MIDI, RTP-MIDI and GPIO routing monitor</p>
        </div>
        <div class="bpm-card">
          <span>BPM</span>
          <strong id="bpm">--</strong>
        </div>
      </header>

      <section class="toolbar">
        <button id="learn-toggle" type="button">Enable learn mode</button>
        <span id="connection-state">connecting...</span>
      </section>

      <section class="grid">
        <article>
          <h2>Master Clock</h2>
          <dl id="master-clock"></dl>
        </article>
        <article>
          <h2>GPIO Inputs</h2>
          <form id="gpio-form">
            <div id="gpio-pins" class="gpio-pins"></div>
            <label class="inline-field">
              <input id="gpio-active-low" type="checkbox" />
              Active low
            </label>
            <label>
              Bounce ms
              <input id="gpio-bounce-ms" type="number" min="0" step="1" />
            </label>
            <label>
              Poll interval ms
              <input id="gpio-poll-ms" type="number" min="1" step="1" />
            </label>
            <button type="submit">Save GPIO inputs</button>
            <p id="gpio-message" class="message"></p>
          </form>
        </article>
        <article>
          <h2>Mappings</h2>
          <ul id="mappings"></ul>
        </article>
        <article>
          <h2>OSC Libraries</h2>
          <ul id="osc-libraries"></ul>
        </article>
        <article>
          <h2>MIDI Libraries</h2>
          <ul id="midi-libraries"></ul>
        </article>
        <article>
          <h2>Monitor</h2>
          <ol id="events" class="events"></ol>
        </article>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
