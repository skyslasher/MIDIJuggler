[library]
id = "behringer_wing"
name = "Behringer Wing MIDI Remote"
vendor = "Behringer"
model = "Wing"
notes = "WING Port 4 MIDI remote-control mapping from the official WING MIDI documentation. Faders use MIDI channel 1, mutes channel 2, pan channel 3. Input channel faders cover channels 1-40 (CC 12-31 and 44-63). DCA faders use channel 4, DCA and mute-group mutes use channel 5. FX slots 1-8 use MIDI channels 9-16 with CC 12-58; FX slots 9-16 use the same MIDI channels with CC 70-110. Values are 7-bit (0-127)."

[[templates]]
id = "ch_{channel}_fdr"
label = "Channel {channel} Fader"
address = "wing-midi://ch/{channel}/fdr"
range_name = "channel"
range_start = 1
range_end = 20
derived = [
  { name = "cc_number", source = "channel", offset = 11 },
]
message_type = "control_change"
value_type = "int"
value_min = 0
value_max = 127
category = "channel"
direction = "target"
midi_channel = 1
number = "{cc_number}"
description = "Channel {channel} fader on Wing MIDI channel 1, CC {cc_number}."

