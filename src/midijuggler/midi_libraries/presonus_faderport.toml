[library]
id = "presonus_faderport"
name = "PreSonus FaderPort 8/16 MIDI"
vendor = "PreSonus"
model = "FaderPort 8/16"
notes = "MCU-style mapping catalog for FaderPort 8 and FaderPort 16. FaderPort 8 uses the first bank. FaderPort 16 uses two 8-channel MCU banks; channels 9-16 repeat the MCU channel controls on the second MIDI port. LCD track names use the PreSonus scribble-strip SysEx format."

[[templates]]
id = "ch_{channel}_fader"
label = "Channel {channel} Fader"
address = "mcu://port_1/fader/{mcu_channel}"
range_name = "channel"
range_start = 1
range_end = 8
derived = [
  { name = "mcu_channel", source = "channel", offset = 0 },
]
message_type = "pitch_bend"
value_type = "int"
value_min = 0
value_max = 16383
category = "channel"
direction = "source"
port = "port_1"
midi_channel = "{mcu_channel}"
description = "Motorized fader value for channel {channel}, using MCU pitch bend resolution."

[[templates]]
id = "ch_{channel}_fader"
label = "Channel {channel} Fader"
address = "mcu://port_2/fader/{mcu_channel}"
range_name = "channel"
range_start = 9
range_end = 16
derived = [
  { name = "mcu_channel", source = "channel", offset = -8 },
]
message_type = "pitch_bend"
value_type = "int"
value_min = 0
value_max = 16383
category = "channel"
direction = "source"
port = "port_2"
midi_channel = "{mcu_channel}"
description = "Motorized fader value for FaderPort 16 channel {channel}, using the second MCU bank."

[[templates]]
id = "ch_{channel}_pan_encoder"
label = "Channel {channel} Pan Encoder"
address = "mcu://port_1/vpot/{mcu_channel}"
range_name = "channel"
range_start = 1
range_end = 8
derived = [
  { name = "mcu_channel", source = "channel", offset = 0 },
  { name = "cc_number", source = "channel", offset = 15 },
]
message_type = "control_change"
value_type = "relative"
value_min = 1
value_max = 127
category = "channel"
direction = "source"
port = "port_1"
midi_channel = 1
number = "{cc_number}"
description = "Pan/V-Pot encoder for channel {channel}; values are relative MCU encoder steps."

[[templates]]
