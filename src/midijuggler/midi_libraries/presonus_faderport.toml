[[templates]]
id = "ch_{channel}_lcd_track_name"
label = "Channel {channel} LCD Track Name"
address = "presonus://port_1/lcd/{strip}/line/0"
range_name = "channel"
range_start = 1
range_end = 8
derived = [
  { name = "strip", source = "channel", offset = -1 },
]
message_type = "sysex"
value_type = "text"
category = "display"
direction = "target"
port = "port_1"
strip = "{strip}"
line = 0
text_length = 7
sysex_template = "F0 00 01 06 02 12 {strip:02X} 00 00 {{text}} F7"
description = "Write the track name to LCD scribble strip {strip} line 0 for channel {channel}. Keep names to 7 ASCII characters for best fit."

