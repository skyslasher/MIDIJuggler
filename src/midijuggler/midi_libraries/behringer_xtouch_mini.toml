[library]
id = "behringer_xtouch_mini"
name = "Behringer X-Touch Mini MIDI"
vendor = "Behringer"
model = "X-Touch Mini"
notes = "Logical Standard Mode mapping catalog for X-Touch Mini. Control and internal value targets use MIDI channel 11 (0-127, persisted in X-Touch Editor memory). LED ring display targets use MIDI channel 12 (0-28 ring positions). The controller is user-programmable with the X-Touch Editor; this library uses a predictable two-layer layout with 8 encoders, 16 buttons and one fader per layer."

[[templates]]
id = "layer_a_encoder_{encoder}_turn"
label = "Layer A Encoder {encoder} Turn"
address = "xtouch-mini://layer_a/encoder/{encoder}/turn"
range_name = "encoder"
range_start = 1
range_end = 8
message_type = "control_change"
value_type = "relative"
relative_encoding = "absolute_delta"
value_min = 1
value_max = 127
category = "encoder"
direction = "source"
midi_channel = 11
number = "{encoder}"
description = "Layer A endless encoder {encoder} turn, intended for relative CC mapping."

[[templates]]
id = "layer_b_encoder_{encoder}_turn"
label = "Layer B Encoder {encoder} Turn"
address = "xtouch-mini://layer_b/encoder/{encoder}/turn"
range_name = "encoder"
range_start = 1
range_end = 8
derived = [
  { name = "cc_number", source = "encoder", offset = 10 },
]
message_type = "control_change"
value_type = "relative"
relative_encoding = "absolute_delta"
value_min = 1
value_max = 127
category = "encoder"
direction = "source"
midi_channel = 11
number = "{cc_number}"
description = "Layer B endless encoder {encoder} turn on CC 11-18, intended for relative CC mapping."

