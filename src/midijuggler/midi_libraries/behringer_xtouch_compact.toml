[library]
id = "behringer_xtouch_compact"
name = "Behringer X-Touch Compact MIDI"
vendor = "Behringer"
model = "X-Touch Compact"
notes = "Factory Standard Mode mapping for the X-Touch Compact from the official quick start guide. Layer A (mixer control) and Layer B (instrument control) use MIDI channel 1. Encoder turns, fader movement/touch and foot controls send control changes; encoder push and buttons send notes. Host feedback uses CC 1-9 and CC 28-36 for motorized faders, CC 26-41 for encoder LED rings, and note velocity for button LEDs. The controller is user-programmable with the X-Touch Editor; relative encoder turns are recommended for control surfaces."

[[templates]]
id = "layer_a_encoder_{encoder}_turn"
label = "Layer A Encoder {encoder} Turn"
address = "xtouch-compact://layer_a/encoder/{encoder}/turn"
range_name = "encoder"
range_start = 1
range_end = 8
derived = [ { name = "cc_number", source = "encoder", offset = 9 } ]
message_type = "control_change"
value_type = "relative"
relative_encoding = "absolute_delta"
value_min = 1
value_max = 127
category = "encoder"
direction = "source"
midi_channel = 1
number = "{cc_number}"
description = "Layer A encoder {encoder} turn on CC {cc_number}."

