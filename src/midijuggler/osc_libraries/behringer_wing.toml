[library]
id = "behringer_wing"
name = "Behringer Wing OSC"
vendor = "Behringer"
model = "Wing"
notes = "Common Wing OSC mapping targets using OSC node notation. Wing returns both normalized and engineering values for many parameters; these presets target practical control values."

[[templates]]
id = "ch_{channel}_fdr"
label = "Channel {channel} Fader"
address = "/ch/{channel}/fdr"
range_name = "channel"
range_start = 1
range_end = 48
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "channel"
direction = "target"
description = "Channel strip fader using normalized control range."

[[templates]]
id = "ch_{channel}_mute"
label = "Channel {channel} Mute"
address = "/ch/{channel}/mute"
range_name = "channel"
range_start = 1
range_end = 48
value_type = "int"
value_min = 0
value_max = 1
category = "channel"
direction = "target"
description = "Channel strip mute. 1 is muted, 0 is unmuted."

[[templates]]
id = "ch_{channel}_pan"
label = "Channel {channel} Pan"
address = "/ch/{channel}/pan"
range_name = "channel"
range_start = 1
range_end = 48
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "channel"
direction = "target"
description = "Channel strip pan, normalized 0.0 left to 1.0 right."

[[templates]]
id = "ch_{channel}_bus_{bus}_send"
label = "Channel {channel} Bus {bus} Send"
address = "/ch/{channel}/send/{bus}/lvl"
ranges = [
  { name = "channel", start = 1, end = 48 },
  { name = "bus", start = 1, end = 16 },
]
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "send"
direction = "target"
description = "Channel send level to bus {bus}, normalized 0.0 to 1.0 for monitor mixes."

[[templates]]
id = "bus_{bus}_fdr"
label = "Bus {bus} Fader"
address = "/bus/{bus}/fdr"
range_name = "bus"
range_start = 1
range_end = 16
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "bus"
direction = "target"
description = "Bus fader using normalized control range."

[[templates]]
id = "bus_{bus}_mute"
label = "Bus {bus} Mute"
address = "/bus/{bus}/mute"
range_name = "bus"
range_start = 1
range_end = 16
value_type = "int"
value_min = 0
value_max = 1
category = "bus"
direction = "target"
description = "Bus mute. 1 is muted, 0 is unmuted."

[[templates]]
id = "mtx_{matrix}_fdr"
label = "Matrix {matrix} Fader"
address = "/mtx/{matrix}/fdr"
range_name = "matrix"
range_start = 1
range_end = 8
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "matrix"
direction = "target"
description = "Matrix fader using normalized control range."

[[templates]]
id = "mtx_{matrix}_mute"
label = "Matrix {matrix} Mute"
address = "/mtx/{matrix}/mute"
range_name = "matrix"
range_start = 1
range_end = 8
value_type = "int"
value_min = 0
value_max = 1
category = "matrix"
direction = "target"
description = "Matrix mute. 1 is muted, 0 is unmuted."

[[templates]]
id = "dca_{dca}_fdr"
label = "DCA {dca} Fader"
address = "/dca/{dca}/fdr"
range_name = "dca"
range_start = 1
range_end = 16
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "dca"
direction = "target"
description = "DCA fader using normalized control range."

[[templates]]
id = "dca_{dca}_mute"
label = "DCA {dca} Mute"
address = "/dca/{dca}/mute"
range_name = "dca"
range_start = 1
range_end = 16
value_type = "int"
value_min = 0
value_max = 1
category = "dca"
direction = "target"
description = "DCA mute. 1 is muted, 0 is unmuted."

[[parameters]]
id = "main_1_fdr"
label = "Main 1 Fader"
address = "/main/1/fdr"
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "main"
direction = "target"
description = "Main 1 fader using normalized control range."

[[parameters]]
id = "main_1_mute"
label = "Main 1 Mute"
address = "/main/1/mute"
value_type = "int"
value_min = 0
value_max = 1
category = "main"
direction = "target"
description = "Main 1 mute. 1 is muted, 0 is unmuted."

[[parameters]]
id = "main_2_fdr"
label = "Main 2 Fader"
address = "/main/2/fdr"
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "main"
direction = "target"
description = "Main 2 fader using normalized control range."

[[parameters]]
id = "main_2_mute"
label = "Main 2 Mute"
address = "/main/2/mute"
value_type = "int"
value_min = 0
value_max = 1
category = "main"
direction = "target"
description = "Main 2 mute. 1 is muted, 0 is unmuted."

# FX rack slots 1-16. Effect-specific parameters below apply only when the loaded
# model exposes that OSC node; query /fx/n/? on the desk to list active params.

[[templates]]
id = "fx_{slot}_fxmix"
label = "FX {slot} Mix"
address = "/fx/{slot}/fxmix"
range_name = "slot"
range_start = 1
range_end = 16
value_type = "float"
value_min = 0.0
value_max = 100.0
category = "fx"
direction = "target"
description = "FX slot {slot} wet/mix percentage (0-100). Always valid regardless of loaded model."

[[templates]]
id = "fx_{slot}_pdel"
label = "FX {slot} Pre-Delay"
address = "/fx/{slot}/pdel"
range_name = "slot"
range_start = 1
range_end = 16
value_type = "float"
value_min = 0.0
value_max = 250.0
category = "fx_reverb"
direction = "target"
description = "FX slot {slot} pre-delay in ms. Valid for most reverb models (ROOM, HALL, V-PLATE, etc.)."

[[templates]]
id = "fx_{slot}_dcy"
label = "FX {slot} Decay"
address = "/fx/{slot}/dcy"
range_name = "slot"
range_start = 1
range_end = 16
value_type = "float"
value_min = 0.2
value_max = 30.0
category = "fx_reverb"
direction = "target"
description = "FX slot {slot} decay time in seconds. Valid for most reverb models; range depends on model."

[[templates]]
id = "fx_{slot}_size"
label = "FX {slot} Size"
address = "/fx/{slot}/size"
range_name = "slot"
range_start = 1
range_end = 16
value_type = "float"
value_min = 0.0
value_max = 100.0
category = "fx_reverb"
direction = "target"
description = "FX slot {slot} room/size parameter. Valid for most reverb models."

[[templates]]
id = "fx_{slot}_lc"
label = "FX {slot} Low Cut"
address = "/fx/{slot}/lc"
range_name = "slot"
range_start = 1
range_end = 16
value_type = "float"
value_min = 20.0
value_max = 400.0
category = "fx_reverb"
direction = "target"
description = "FX slot {slot} low-cut frequency in Hz. Shared by many reverbs and delays."

[[templates]]
id = "fx_{slot}_hc"
label = "FX {slot} High Cut"
address = "/fx/{slot}/hc"
range_name = "slot"
range_start = 1
range_end = 16
value_type = "float"
value_min = 200.0
value_max = 20000.0
category = "fx_reverb"
direction = "target"
description = "FX slot {slot} high-cut frequency in Hz. Shared by many reverbs and delays."

[[templates]]
id = "fx_{slot}_damp"
label = "FX {slot} Damping"
address = "/fx/{slot}/damp"
range_name = "slot"
range_start = 1
range_end = 16
value_type = "float"
value_min = 1000.0
value_max = 20000.0
category = "fx_reverb"
direction = "target"
description = "FX slot {slot} damping frequency in Hz. Valid for most reverb models."

[[templates]]
id = "fx_{slot}_time"
label = "FX {slot} Delay Time"
address = "/fx/{slot}/time"
range_name = "slot"
range_start = 1
range_end = 16
value_type = "float"
value_min = 0.0
value_max = 3000.0
category = "fx_delay"
direction = "target"
description = "FX slot {slot} delay time in ms. Valid for ST-DL, TAP-DL, TAPE-DL and similar delay models."

[[templates]]
id = "fx_{slot}_feed"
label = "FX {slot} Feedback"
address = "/fx/{slot}/feed"
range_name = "slot"
range_start = 1
range_end = 16
value_type = "float"
value_min = 0.0
value_max = 100.0
category = "fx_delay"
direction = "target"
description = "FX slot {slot} delay feedback in percent. Valid for ST-DL, BBD-DL and similar delay models."

[[templates]]
id = "fx_{slot}_dly"
label = "FX {slot} BBD Delay Time"
address = "/fx/{slot}/dly"
range_name = "slot"
range_start = 1
range_end = 16
value_type = "float"
value_min = 0.0
value_max = 100.0
category = "fx_delay"
direction = "target"
description = "FX slot {slot} BBD delay time parameter. Valid when BBD-DL is loaded in the slot."

[[templates]]
id = "ch_{channel}_preins_on"
label = "Channel {channel} Pre-Insert On"
address = "/ch/{channel}/preins/on"
range_name = "channel"
range_start = 1
range_end = 48
value_type = "int"
value_min = 0
value_max = 1
category = "fx_insert"
direction = "target"
description = "Channel {channel} pre-insert FX bypass. 1 enables the assigned FX slot on the pre-insert."

