[library]
id = "behringer_wing"
name = "Behringer Wing OSC"
vendor = "Behringer"
model = "Wing"
notes = "Common Wing OSC mapping targets using OSC node notation. Wing returns both normalized and engineering values for many parameters; these presets target practical control values."

[[templates]]
id = "ch_{channel}_fdr"
label = "Channel {channel} Fader"
address = "/ch/{channel}/fdr"
range_name = "channel"
range_start = 1
range_end = 48
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "channel"
direction = "target"
description = "Channel strip fader using normalized control range."

[[templates]]
id = "ch_{channel}_mute"
label = "Channel {channel} Mute"
address = "/ch/{channel}/mute"
range_name = "channel"
range_start = 1
range_end = 48
value_type = "int"
value_min = 0
value_max = 1
category = "channel"
direction = "target"
description = "Channel strip mute. 1 is muted, 0 is unmuted."

[[templates]]
id = "ch_{channel}_pan"
label = "Channel {channel} Pan"
address = "/ch/{channel}/pan"
range_name = "channel"
range_start = 1
range_end = 48
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "channel"
direction = "target"
description = "Channel strip pan, normalized 0.0 left to 1.0 right."

[[templates]]
id = "ch_{channel}_bus_{bus}_send"
label = "Channel {channel} Bus {bus} Send"
address = "/ch/{channel}/send/{bus}/lvl"
ranges = [
  { name = "channel", start = 1, end = 48 },
  { name = "bus", start = 1, end = 16 },
]
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "send"
direction = "target"
description = "Channel send level to bus {bus}, normalized 0.0 to 1.0 for monitor mixes."

[[templates]]
id = "bus_{bus}_fdr"
label = "Bus {bus} Fader"
address = "/bus/{bus}/fdr"
range_name = "bus"
range_start = 1
range_end = 16
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "bus"
direction = "target"
description = "Bus fader using normalized control range."

[[templates]]
id = "bus_{bus}_mute"
label = "Bus {bus} Mute"
address = "/bus/{bus}/mute"
range_name = "bus"
range_start = 1
range_end = 16
value_type = "int"
value_min = 0
value_max = 1
category = "bus"
direction = "target"
description = "Bus mute. 1 is muted, 0 is unmuted."

