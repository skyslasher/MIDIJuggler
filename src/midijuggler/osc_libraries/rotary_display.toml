[library]
id = "rotary_display"
name = "MIDIJuggler Rotary Display"
vendor = "MIDIJuggler"
model = "Elecrow Rotary Encoder"
bundled = true
notes = "OSC protocol for the Elecrow 1.28 inch rotary display. Encoder commands use /midijuggler/clock/* on the host listen port; feedback to the device uses /midijuggler/rotary/* on the device listen port. Creating a device with this library auto-wires the bundled connections below."

[[bundled_connections]]
id = "bpm-to-clock"
label = "Encoder BPM → clock"
connection_id = "{device_id}-bpm-to-clock"
source_suffix = "./midijuggler/clock/bpm"
target = "clock.bpm_set"
modifier = "passthrough"
managed_by = "rotary_display"
direction = "encoder_to_host"

[[bundled_connections]]
id = "start-stop-to-clock"
label = "Encoder start/stop → clock"
connection_id = "{device_id}-start-stop-to-clock"
source_suffix = "./midijuggler/clock/start_stop"
target = "clock.start_stop"
modifier = "passthrough"
managed_by = "rotary_display"
direction = "encoder_to_host"

[[bundled_connections]]
id = "click-toggle-to-clock"
label = "Encoder click toggle → clock"
connection_id = "{device_id}-click-toggle-to-clock"
source_suffix = "./midijuggler/clock/click_toggle"
target = "clock.click_toggle"
modifier = "passthrough"
managed_by = "rotary_display"
direction = "encoder_to_host"

[[bundled_connections]]
id = "tap-tempo-to-clock"
label = "Encoder tap tempo → clock"
connection_id = "{device_id}-tap-tempo-to-clock"
source_suffix = "./midijuggler/clock/tap_tempo"
target = "clock.tap_tempo"
modifier = "passthrough"
managed_by = "rotary_display"
direction = "encoder_to_host"

[[bundled_connections]]
id = "clock-bpm-to-device"
label = "Clock BPM → display"
connection_id = "clock-bpm-to-{device_id}"
source = "clock.bpm"
target_suffix = "./midijuggler/rotary/bpm"
modifier = "passthrough"
managed_by = "rotary_display"
direction = "host_to_encoder"

[[bundled_connections]]
id = "clock-running-to-device"
label = "Clock running → display"
connection_id = "clock-running-to-{device_id}"
source = "clock.running"
target_suffix = "./midijuggler/rotary/running"
modifier = "passthrough"
managed_by = "rotary_display"
direction = "host_to_encoder"

[[bundled_connections]]
id = "clock-click-enabled-to-device"
label = "Clock click enabled → display"
connection_id = "clock-click-enabled-to-{device_id}"
source = "clock.click_enabled"
target_suffix = "./midijuggler/rotary/click_enabled"
modifier = "passthrough"
managed_by = "rotary_display"
direction = "host_to_encoder"

[[bundled_connections]]
id = "clock-click-interval-to-device"
label = "Clock click interval → display"
connection_id = "clock-click-interval-to-{device_id}"
source = "clock.click_interval"
target_suffix = "./midijuggler/rotary/click_interval"
modifier = "passthrough"
managed_by = "rotary_display"
direction = "host_to_encoder"

[[bundled_connections]]
id = "clock-beat-to-device"
label = "Clock beat → display"
connection_id = "clock-beat-to-{device_id}"
source = "clock.beat"
target_suffix = "./midijuggler/rotary/beat"
modifier = "passthrough"
managed_by = "rotary_display"
direction = "host_to_encoder"

# Device -> host (encoder commands)
[[parameters]]
id = "clock_bpm"
label = "Set BPM"
address = "/midijuggler/clock/bpm"
value_type = "float"
value_min = 40.0
value_max = 240.0
category = "clock"
direction = "source"
description = "Set master clock BPM from the rotary encoder."

[[parameters]]
id = "clock_start_stop"
label = "Start / Stop"
address = "/midijuggler/clock/start_stop"
value_type = "int"
value_min = 0
value_max = 1
category = "clock"
direction = "source"
description = "Toggle master clock transport."

[[parameters]]
id = "clock_click_toggle"
label = "Click toggle"
address = "/midijuggler/clock/click_toggle"
value_type = "int"
value_min = 0
value_max = 1
category = "clock"
direction = "source"
description = "Toggle the master clock audio click."

[[parameters]]
id = "clock_tap_tempo"
label = "Tap tempo"
address = "/midijuggler/clock/tap_tempo"
value_type = "int"
value_min = 0
value_max = 1
category = "clock"
direction = "source"
description = "Register a tap-tempo pulse from the encoder button."

[[parameters]]
id = "clock_click_interval"
label = "Click interval"
address = "/midijuggler/clock/click_interval"
value_type = "string"
value_min = 0
value_max = 1
category = "clock"
direction = "source"
description = "Set click interval (sixteenth, eighth, quarter, half, whole)."

[[parameters]]
id = "rotary_hello"
label = "Hello / register"
address = "/midijuggler/rotary/hello"
value_type = "string"
value_min = 0
value_max = 1
category = "registration"
direction = "source"
description = "Device registration with feedback host (string) and listen port (int)."

# Host -> device (feedback)
[[parameters]]
id = "rotary_bpm"
label = "Feedback BPM"
address = "/midijuggler/rotary/bpm"
value_type = "float"
value_min = 40.0
value_max = 240.0
category = "feedback"
direction = "target"
description = "Push current BPM to the display."

[[parameters]]
id = "rotary_running"
label = "Feedback transport running"
address = "/midijuggler/rotary/running"
value_type = "int"
value_min = 0
value_max = 1
category = "feedback"
direction = "target"
description = "Push transport running state (1=running, 0=stopped)."

[[parameters]]
id = "rotary_click_enabled"
label = "Feedback audio click"
address = "/midijuggler/rotary/click_enabled"
value_type = "int"
value_min = 0
value_max = 1
category = "feedback"
direction = "target"
description = "Push audio click enabled state."

[[parameters]]
id = "rotary_click_interval"
label = "Feedback click interval"
address = "/midijuggler/rotary/click_interval"
value_type = "string"
value_min = 0
value_max = 1
category = "feedback"
direction = "target"
description = "Push click interval name (sixteenth..whole). Prefer rotary_display.click_interval via module."

[[parameters]]
id = "rotary_sync"
label = "Clock sync (combined)"
address = "/midijuggler/rotary/sync"
value_type = "float"
value_min = 40.0
value_max = 240.0
category = "feedback"
direction = "target"
description = "Combined sync message (bpm, running, click, interval). Used by the interface module."

[[parameters]]
id = "rotary_beat"
label = "Beat pulse"
address = "/midijuggler/rotary/beat"
value_type = "float"
value_min = 0.0
value_max = 1.0
category = "feedback"
direction = "target"
description = "Beat flash pulse for the display LED ring and UI."
